# ==========================================================================
# HEAVEN NATURALS — DECAP CMS CONFIGURATION
# Git-based content management. Every collection maps to a single JSON
# file under /content, which the site fetches directly at runtime.
# ==========================================================================

backend:
  name: git-gateway
  branch: main
  # For local editing without Netlify Identity, run:
  #   npx decap-server
  # then uncomment the two lines below and set backend.name to "proxy":
  # name: proxy
  # proxy_url: http://localhost:8081/api/v1

# Enables the "Login with Netlify Identity" flow in production.
site_url: https://www.heavennaturals.com
display_url: https://www.heavennaturals.com
logo_url: /assets/images/logo.svg

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: simple
locale: "en"

collections:

  # ---------------------------------------------------------------
  # PRODUCTS — single JSON file holding a list of products
  # ---------------------------------------------------------------
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "All Products"
        file: "content/products.json"
        format: "json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.category}}"
            fields:
              - { label: "ID (unique slug)", name: "id", widget: "string", hint: "e.g. raw-honey-500g — no spaces" }
              - { label: "Name", name: "name", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Honey", value: "honey" }
                  - { label: "Desi Ghee", value: "ghee" }
                  - { label: "Dates", value: "dates" }
                  - { label: "Islamic Decor", value: "islamic" }
                  - { label: "Gift Collections", value: "gifts" }
              - { label: "Price (PKR)", name: "price", widget: "number", value_type: "int" }
              - { label: "Old Price (optional, for discount badge)", name: "oldPrice", widget: "number", value_type: "int", required: false }
              - { label: "Main Image", name: "image", widget: "image", default: "assets/images/product-placeholder.svg" }
              - label: "Gallery (optional)"
                name: "gallery"
                widget: "list"
                field: { label: "Image", name: "src", widget: "image" }
                required: false
              - { label: "Short Description", name: "shortDescription", widget: "string" }
              - { label: "Full Description", name: "description", widget: "text" }
              - label: "Benefits"
                name: "benefits"
                widget: "list"
                field: { label: "Benefit", name: "benefit", widget: "string" }
              - { label: "Weight / Size", name: "weight", widget: "string" }
              - { label: "Featured on homepage?", name: "featured", widget: "boolean", default: false }
              - { label: "Stock Quantity", name: "stock", widget: "number", value_type: "int", default: 10 }

  # ---------------------------------------------------------------
  # CATEGORIES
  # ---------------------------------------------------------------
  - name: "categories"
    label: "Categories"
    files:
      - name: "categories"
        label: "All Categories"
        file: "content/categories.json"
        format: "json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "must match a product category value" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }

  # ---------------------------------------------------------------
  # HOMEPAGE
  # ---------------------------------------------------------------
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Hero & Intro Content"
        file: "content/homepage.json"
        format: "json"
        fields:
          - { label: "Hero Badge Text", name: "heroBadge", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string" }
          - { label: "Hero Description", name: "heroDescription", widget: "text" }
          - { label: "About Section Text", name: "aboutText", widget: "text" }

  # ---------------------------------------------------------------
  # TESTIMONIALS
  # ---------------------------------------------------------------
  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "All Testimonials"
        file: "content/testimonials.json"
        format: "json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Customer Name", name: "name", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Rating (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
              - { label: "Quote", name: "quote", widget: "text" }

  # ---------------------------------------------------------------
  # FAQs
  # ---------------------------------------------------------------
  - name: "faqs"
    label: "FAQs"
    files:
      - name: "faqs"
        label: "All FAQs"
        file: "content/faqs.json"
        format: "json"
        fields:
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            summary: "{{fields.question}}"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

  # ---------------------------------------------------------------
  # SETTINGS
  # ---------------------------------------------------------------
  - name: "settings"
    label: "Settings"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - { label: "WhatsApp Number (with country code, no + or spaces)", name: "whatsappNumber", widget: "string", hint: "e.g. 923001234567" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Currency Symbol/Prefix", name: "currency", widget: "string", default: "Rs." }
